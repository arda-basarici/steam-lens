name: CI

# Lint, type-check, and test the library on every push and PR. The pytest run
# includes the import-graph test (the two-track wall) and all doctests.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Sync the locked environment
        run: uv sync --locked

      - name: Ruff (lint)
        run: uv run ruff check

      - name: Pyright (types, strict)
        run: uv run pyright

      - name: Pytest (tests + import graph + doctests)
        run: uv run pytest -q
